<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expediente del paciente (nombre)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Detalles del Expediente Clínico</h4>
            </div>
            <div class="card-body">
                <table class="table table-bordered table-striped">
                    <tbody>
                        <tr>
                            <th style="width: 30%;">ID Paciente:</th>
                            <td><strong>id del paciente</strong></td>
                        </tr>
                        <tr>
                            <th>Nombre Completo:</th>
                            <td>nombre del paciente</td>
                        </tr>
                        <tr>
                            <th>Edad:</th>
                            <td>edad en años</td>
                        </tr>
                        <tr>
                            <th>Diagnóstico:</th>
                            <td><span class="badge bg-info text-dark fs-6">diagnostico del paciente</span></td>
                        </tr>
                    </tbody>
                </table>
                <div class="text-center mt-4">
                    <button onclick="window.close();" class="btn btn-secondary">Cerrar Ventana</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
